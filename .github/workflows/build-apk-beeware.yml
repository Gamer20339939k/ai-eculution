name: Build APK (BeeWare)

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase toga

      - name: Build Android APK (BeeWare)
        run: |
          cd beeware-app
          briefcase create android --no-input
          briefcase build android --no-input
          briefcase package android --no-input

      - name: Collect APK
        run: |
          mkdir -p dist-apk
          find beeware-app -type f -name "*.apk" -exec cp {} dist-apk/ \;
          ls -la dist-apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: dist-apk/*.apk
          if-no-files-found: error
